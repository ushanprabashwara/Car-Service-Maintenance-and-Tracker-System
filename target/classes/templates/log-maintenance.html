<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Maintenance | AutoTrack</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fade-in">
<nav class="navbar">
    <div class="logo"><i class="fas fa-car-side"></i> AutoTrack</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/services/history">Service History</a>
        <a href="#" onclick="session.logout()" class="btn btn-sm btn-danger" style="margin-left:1rem;">
            <i class="fas fa-power-off"></i> Logout
        </a>
    </div>
</nav>

<div class="container" style="max-width:650px; margin-top:2.5rem;">
    <div class="card glass">
        <div style="text-align:center; margin-bottom:2rem;">
            <h2 style="font-size:2rem; color:var(--accent);"><i class="fas fa-tools"></i> Log Maintenance</h2>
            <p style="color:var(--text-muted);">Keep your vehicle records up to date.</p>
        </div>

        <form id="maintenanceForm" class="grid-form">
            <div class="form-group grid-full">
                <label><i class="fas fa-car"></i> Select Vehicle</label>
                <select id="vehicle" name="vehicle" required>
                    <option value="" disabled selected>Loading vehicles...</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Service Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Service Category</label>
                <select id="category" name="category" required>
                    <option value="STANDARD">Standard Maintenance</option>
                    <option value="EMERGENCY">Emergency Repair (50% surcharge)</option>
                </select>
            </div>

            <div class="form-group grid-full">
                <label><i class="fas fa-file-alt"></i> Description of Work</label>
                <input type="text" id="description" placeholder="e.g., Full oil change & brake pad replacement" required>
            </div>

            <div class="form-group grid-full">
                <label><i class="fas fa-dollar-sign"></i> Base Cost</label>
                <input type="number" id="cost" step="0.01" min="0.01" placeholder="0.00" required>
                <p style="font-size:0.8rem; color:var(--text-muted); margin-top:0.4rem;">
                    Standard adds a flat $25 fee. Emergency adds a 50% surcharge.
                </p>
            </div>

            <div class="grid-full" style="margin-top:0.5rem;">
                <button type="submit" id="saveBtn" class="btn btn-primary" style="width:100%;">
                    <i class="fas fa-check-circle"></i> Save Record
                </button>
            </div>
        </form>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!(await session.check())) { window.location.href = '/login'; return; }

        const select = document.getElementById('vehicle');
        try {
            const res = await fetch('/api/vehicles/my');
            if (res.ok) {
                const vehicles = await res.json();
                if (vehicles.length === 0) {
                    select.innerHTML = '<option value="">No vehicles found. Please register one.</option>';
                } else {
                    select.innerHTML = '<option value="" disabled selected>Select a vehicle...</option>' +
                        vehicles.map(v => `<option value="${v.plateNumber}">${v.model} (${v.plateNumber})</option>`).join('');
                }
            } else {
                select.innerHTML = '<option value="">Error loading vehicles. Please log in again.</option>';
            }
        } catch (err) {
            select.innerHTML = '<option value="">Connection error.</option>';
        }
    });

    document.getElementById('maintenanceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;

        const payload = {
            plateNumber: document.getElementById('vehicle').value,
            date: document.getElementById('date').value,
            serviceType: document.getElementById('category').value,
            description: document.getElementById('description').value,
            cost: parseFloat(document.getElementById('cost').value)
        };

        try {
            const res = await fetch('/api/services/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                notify('Maintenance record saved!');
                setTimeout(() => window.location.href = '/services/history', 1500);
            } else {
                notify(await res.text(), 'error');
                btn.disabled = false;
            }
        } catch (err) {
            notify('Could not connect to the server.', 'error');
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
