<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | AutoTrack</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="fade-in">
<nav class="navbar">
    <div class="logo"><i class="fas fa-car-side"></i> AutoTrack</div>
    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/feedback/add">Write a Review</a>
        <a href="#" onclick="session.logout()" class="btn btn-sm btn-danger" style="margin-left:1rem;">
            <i class="fas fa-power-off"></i> Logout
        </a>
    </div>
</nav>

<div class="container fade-in">
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
        <div>
            <h2 style="font-size:2rem; color:var(--accent);">Customer Reviews</h2>
            <p style="color:var(--text-muted); margin-top:0.25rem;">See what our customers are saying.</p>
        </div>
        <a href="/feedback/add" class="btn btn-primary"><i class="fas fa-plus"></i> Add Review</a>
    </header>

    <div id="reviewGrid" class="vehicle-grid">
        <p style="color:var(--text-muted);">Loading reviews...</p>
    </div>
</div>

<script src="/js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!(await session.check())) { window.location.href = '/login'; return; }
        loadReviews();
    });

    async function loadReviews() {
        try {
            const reviews = await api.get('/api/reviews/all');
            const grid = document.getElementById('reviewGrid');
            if (reviews.length === 0) {
                grid.innerHTML = `<div class="card" style="grid-column:1/-1; text-align:center; padding:3rem;">
                    <i class="fas fa-star" style="font-size:3rem; opacity:0.15; margin-bottom:1rem; display:block;"></i>
                    <p style="color:var(--text-muted);">No reviews yet. Be the first!</p>
                    <a href="/feedback/add" class="btn btn-primary" style="margin-top:1rem;">Write a Review</a>
                </div>`;
                return;
            }
            grid.innerHTML = reviews.map(r => `
                <div class="vehicle-card fade-in">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
                        <strong style="font-size:1rem;">${r.username}</strong>
                        <span style="color:#f59e0b; font-size:0.85rem;">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                    </div>
                    <p style="color:var(--text-muted); font-size:0.9rem; line-height:1.6;">${r.comment}</p>
                    ${r.type === 'VERIFIED' ? '<span class="vehicle-type-badge" style="margin-top:0.75rem;"><i class="fas fa-check-circle"></i> Verified</span>' : ''}
                </div>
            `).join('');
        } catch (err) {
            notify(err.message, 'error');
        }
    }
</script>
</body>
</html>
