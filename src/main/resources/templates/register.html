<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AutoTrack</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body class="fade-in">
    <nav class="navbar">
        <div class="logo"><i class="fas fa-car-side"></i> AutoTrack</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <div class="container" style="max-width: 550px; margin-top: 3rem; margin-bottom: 3rem;">
        <div class="card glass">
            <div class="card-header" style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem; color: var(--accent);">Join AutoTrack</h2>
                <p style="color: var(--text-muted);">Securely manage your vehicle fleet and service history.</p>
            </div>
            
            <form id="registerForm" class="grid-form" style="display: grid; gap: 1rem;">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required minlength="3">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" placeholder="+94 77 123 4567" required pattern="[0-9+ \-]+">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-double"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required minlength="6" autocomplete="new-password">
                </div>
                
                <div style="margin-top: 1.5rem;">
                    <button type="submit" id="registerBtn" class="btn btn-primary" style="width: 100%;">
                        <span>Create My Account</span> <i class="fas fa-user-plus"></i>
                    </button>
                </div>
            </form>
            
            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem;">
                Already part of AutoTrack? <a href="/login" style="color: var(--accent); font-weight: 500;">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (password !== confirm) {
                notify("Passwords do not match!", "error");
                return;
            }
            
            const registerBtn = document.getElementById('registerBtn');
            const originalBtnHtml = registerBtn.innerHTML;
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

            const data = {
                fullName: document.getElementById('fullName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phoneNumber: document.getElementById('phone').value.trim(),
                password: password,
                role: 'USER'
            };

            try {
                const response = await api.post('/api/users/register', data);
                notify('Account created! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/login', 2000);
            } catch (err) {
                notify(err.message || 'Registration failed', 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = originalBtnHtml;
            }
        };
    </script>
</body>
</html>
